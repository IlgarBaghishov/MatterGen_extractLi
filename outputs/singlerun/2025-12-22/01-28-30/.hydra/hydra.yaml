hydra:
  run:
    dir: ${oc.env:OUTPUT_DIR,outputs/singlerun/${now:%Y-%m-%d}/${now:%H-%M-%S}}
  sweep:
    dir: multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
  launcher:
    _target_: hydra._internal.core_plugins.basic_launcher.BasicLauncher
  sweeper:
    _target_: hydra._internal.core_plugins.basic_sweeper.BasicSweeper
    max_batch_size: null
    params: null
  help:
    app_name: ${hydra.job.name}
    header: '${hydra.help.app_name} is powered by Hydra.

      '
    footer: 'Powered by Hydra (https://hydra.cc)

      Use --hydra-help to view Hydra specific help

      '
    template: '${hydra.help.header}

      == Configuration groups ==

      Compose your configuration from those groups (group=option)


      $APP_CONFIG_GROUPS


      == Config ==

      Override anything in the config (foo.bar=value)


      $CONFIG


      ${hydra.help.footer}

      '
  hydra_help:
    template: 'Hydra (${hydra.runtime.version})

      See https://hydra.cc for more info.


      == Flags ==

      $FLAGS_HELP


      == Configuration groups ==

      Compose your configuration from those groups (For example, append hydra/job_logging=disabled
      to command line)


      $HYDRA_CONFIG_GROUPS


      Use ''--cfg hydra'' to Show the Hydra config.

      '
    hydra_help: ???
  hydra_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][HYDRA] %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
    root:
      level: INFO
      handlers:
      - console
    loggers:
      logging_example:
        level: DEBUG
    disable_existing_loggers: false
  job_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][%(name)s][%(levelname)s] - %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
      file:
        class: logging.FileHandler
        formatter: simple
        filename: ${hydra.runtime.output_dir}/${hydra.job.name}.log
    root:
      level: INFO
      handlers:
      - console
      - file
    disable_existing_loggers: false
  env: {}
  mode: RUN
  searchpath: []
  callbacks: {}
  output_subdir: .hydra
  overrides:
    hydra:
    - hydra.mode=RUN
    task:
    - adapter.pretrained_name=mattergen_base
    - data_module=li_data_20_diff_add2
    - +lightning_module/diffusion_module/model/property_embeddings@adapter.adapter.property_embeddings_adapt.Li_voltage=Li_voltage
    - +lightning_module/diffusion_module/model/property_embeddings@adapter.adapter.property_embeddings_adapt.Na_voltage=Na_voltage
    - ~trainer.logger
    - data_module.properties=[Li_voltage,Na_voltage]
  job:
    name: finetune
    chdir: null
    override_dirname: +lightning_module/diffusion_module/model/property_embeddings@adapter.adapter.property_embeddings_adapt.Li_voltage=Li_voltage,+lightning_module/diffusion_module/model/property_embeddings@adapter.adapter.property_embeddings_adapt.Na_voltage=Na_voltage,adapter.pretrained_name=mattergen_base,data_module.properties=[Li_voltage,Na_voltage],data_module=li_data_20_diff_add2,~trainer.logger
    id: ???
    num: ???
    config_name: finetune
    env_set: {}
    env_copy: []
    config:
      override_dirname:
        kv_sep: '='
        item_sep: ','
        exclude_keys: []
  runtime:
    version: 1.3.1
    version_base: '1.1'
    cwd: /home/ilgar/mattergen
    config_sources:
    - path: hydra.conf
      schema: pkg
      provider: hydra
    - path: /home/ilgar/mattergen/mattergen/conf
      schema: file
      provider: main
    - path: ''
      schema: structured
      provider: schema
    output_dir: /home/ilgar/mattergen/outputs/singlerun/2025-12-22/01-28-30
    choices:
      lightning_module/diffusion_module/model/property_embeddings@adapter.adapter.property_embeddings_adapt.Na_voltage: Na_voltage
      lightning_module/diffusion_module/model/property_embeddings@adapter.adapter.property_embeddings_adapt.Li_voltage: Li_voltage
      adapter: default
      lightning_module: default
      trainer: default
      data_module: li_data_20_diff_add2
      hydra/env: default
      hydra/callbacks: null
      hydra/job_logging: default
      hydra/hydra_logging: default
      hydra/hydra_help: default
      hydra/help: default
      hydra/sweeper: basic
      hydra/launcher: basic
      hydra/output: default
  verbose: false
